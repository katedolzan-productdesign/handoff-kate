<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kueski — Flow Handoff</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:        #0069f1;
    --brand-light:  #eef4ff;
    --brand-dark:   #0058cc;
    --success:      #008246;
    --success-bg:   #e6f5ee;
    --warn:         #b45309;
    --warn-bg:      #fef3c7;
    --gray-50:      #f7f9fb;
    --gray-100:     #f0f4f8;
    --gray-200:     #e0e7ef;
    --gray-400:     #9aa5ae;
    --gray-600:     #66727d;
    --gray-800:     #384550;
    --gray-900:     #141c22;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius: 14px;
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    font-size: 14px;
    color: var(--gray-900);
    background: var(--gray-100);
  }

  /* ── Page layout ──────────────────────────────────────────── */
  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Header ──────────────────────────────────────────────── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 16px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #25A2FA 0%, #0075FF 48%, #3F58EA 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 20px; height: 20px; }
  .logo-labels { display: flex; flex-direction: column; gap: 1px; }
  .logo-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--gray-900); }
  .logo-sub  { font-size: 12px; color: var(--gray-600); font-weight: 500; }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 280px;
  }
  .search-wrap svg {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    color: var(--gray-400);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    font-family: var(--font);
    font-size: 13px;
    color: var(--gray-900);
    background: #fff;
    outline: none;
    transition: border-color 150ms;
  }
  .search-input:focus { border-color: var(--brand); }
  .search-input::placeholder { color: var(--gray-400); }

  /* ── Section heading ──────────────────────────────────────── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--gray-400);
    margin-bottom: 14px;
  }

  /* ── Flow grid ────────────────────────────────────────────── */
  .flow-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 14px;
  }

  .flow-card {
    background: #fff;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 150ms, box-shadow 150ms;
    text-decoration: none;
    color: inherit;
  }
  .flow-card:hover {
    border-color: rgba(0, 105, 241, 0.3);
    box-shadow: 0 4px 20px rgba(0, 105, 241, 0.08);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-900);
    line-height: 1.2;
    letter-spacing: -0.2px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.55;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    padding-top: 14px;
    border-top: 1px solid var(--gray-100);
  }
  .card-steps {
    font-size: 12px;
    color: var(--gray-400);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-steps svg { width: 13px; height: 13px; }
  .card-cta {
    font-size: 13px;
    font-weight: 600;
    color: var(--brand);
    display: flex;
    align-items: center;
    gap: 4px;
    transition: gap 120ms;
  }
  .flow-card:hover .card-cta { gap: 7px; }
  .card-cta svg { width: 14px; height: 14px; }

  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 500;
    line-height: 1.6;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .badge-ready { background: var(--success-bg); color: var(--success); }
  .badge-draft { background: var(--gray-100);   color: var(--gray-600); }
  .badge-wip   { background: var(--warn-bg);    color: var(--warn); }
  .tag {
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 11.5px;
    font-weight: 500;
    background: var(--gray-100);
    color: var(--gray-600);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-400);
    font-size: 14px;
    display: none;
    grid-column: 1 / -1;
  }

  /* ── Footer hint ──────────────────────────────────────────── */
  .page-footer {
    margin-top: 40px;
    padding: 16px 20px;
    background: #fff;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--gray-600);
    line-height: 1.6;
  }
  .page-footer code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    background: var(--gray-100);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--gray-800);
  }
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <header class="page-header">
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 2.5h3v5.2L12.5 2.5H16l-7 6 7 7h-3.5L6 10.3V15.5H3V2.5Z" fill="white"/>
        </svg>
      </div>
      <div class="logo-labels">
        <div class="logo-name">kueski</div>
        <div class="logo-sub">Flow Handoff</div>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8.5" cy="8.5" r="5.5"/><path d="m13.5 13.5 3 3" stroke-linecap="round"/>
      </svg>
      <input type="search" class="search-input" id="searchInput" placeholder="Buscar flow…" autocomplete="off" spellcheck="false" />
    </div>
  </header>

  <!-- Flow grid -->
  <div class="section-label">Flows</div>
  <div class="flow-grid" id="flowGrid">
    <div class="empty-state" id="emptyState">Sin resultados para tu búsqueda.</div>
  </div>

  <!-- Footer -->
  <div class="page-footer">
    Para agregar un flow: coloca el preview en <code>flows/</code> y añade una entrada al array <code>FLOWS</code> en <code>index.html</code>.
  </div>

</div>

<script>
/* ─────────────────────────────────────────────────────────────
   ★  FLOW REGISTRY  ← Add / edit flows here
   ───────────────────────────────────────────────────────────── */
const FLOWS = [
  {
    id: 'login',
    title: 'Login Flow',
    description: 'Autenticación por correo y contraseña, con configuración biométrica opcional y pantalla de bienvenida.',
    file: 'flows/LoginFlow/login-flow-preview.html',
    status: 'ready',
    tags: ['auth', 'onboarding'],
    steps: 4,
  },
  {
    id: 'personal-info',
    title: 'Personal Info Flow',
    description: 'Registro de datos personales (Paso 2 de 5). Lookup automático de CURP vía API, con manejo de error si la CURP ya está registrada.',
    file: 'flows/PersonalInfoFlow/personal-info-flow-preview.html',
    status: 'ready',
    tags: ['onboarding', 'kyc'],
    steps: 3,
  },
  {
    id: 'passkeys',
    title: 'Passkeys Flow',
    description: 'Exploración de passkeys como método de autenticación. Incluye Login, Enrollar desde Mi Cuenta, y Registro sin contraseña. Variantes iOS y Android.',
    file: 'flows/PasskeysFlow/passkeys-flow-preview.html',
    status: 'ready',
    tags: ['auth', 'passkeys', 'fido2'],
    steps: 12,
  },
  /* ── Paste new flow objects here ─────────────────────────── */
];

/* ─────────────────────────────────────────────────────────────
   Render
   ───────────────────────────────────────────────────────────── */
const grid    = document.getElementById('flowGrid');
const empty   = document.getElementById('emptyState');
const search  = document.getElementById('searchInput');

function statusInfo(s) {
  if (s === 'ready') return { text: 'Listo',       cls: 'badge-ready' };
  if (s === 'wip')   return { text: 'En progreso', cls: 'badge-wip'   };
  return                    { text: 'Borrador',     cls: 'badge-draft' };
}

function renderGrid(flows) {
  grid.querySelectorAll('.flow-card').forEach(el => el.remove());
  empty.style.display = flows.length === 0 ? 'block' : 'none';

  flows.forEach(flow => {
    const { text, cls } = statusInfo(flow.status);
    const card = document.createElement('a');
    card.className = 'flow-card';
    card.href = flow.file;
    card.target = '_blank';
    card.rel = 'noopener';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-title">${esc(flow.title)}</div>
        <span class="badge ${cls}"><span class="badge-dot"></span>${text}</span>
      </div>
      <div class="card-desc">${esc(flow.description)}</div>
      <div class="card-meta">
        ${flow.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}
      </div>
      <div class="card-footer">
        <div class="card-steps">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5l2 2" stroke-linecap="round"/>
          </svg>
          ${flow.steps} estado${flow.steps !== 1 ? 's' : ''}
        </div>
        <div class="card-cta">
          Ver preview
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 8h10M9 4l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  renderGrid(q
    ? FLOWS.filter(f =>
        f.title.toLowerCase().includes(q) ||
        f.description.toLowerCase().includes(q) ||
        f.tags.some(t => t.includes(q))
      )
    : FLOWS
  );
});

renderGrid(FLOWS);
</script>
</body>
</html>
